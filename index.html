<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gift Shop Vellore — Custom Made Gifts in Resin, Laser & 3D Printing</title>
    <meta name="description" content="Gift Shop Vellore creates custom made luxury gifts using epoxy resin, laser cutting, and 3D printing. Order your unique gift today." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://code.createjs.com/easeljs-0.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.18.0/TweenMax.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const revealElements = document.querySelectorAll(".reveal-element");
        if (!revealElements.length) return;
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add("active");
              observer.unobserve(entry.target);
            }
          });
        }, { rootMargin: "0px 0px -80px 0px", threshold: 0.15 });
        revealElements.forEach(el => observer.observe(el));
      });
    </script>
  </body>
</html>
